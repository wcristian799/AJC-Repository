services:
  postgres:
    image: postgis/postgis:16-3.4
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-ajc}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?defina POSTGRES_PASSWORD no Coolify}
      POSTGRES_DB: ${POSTGRES_DB:-ajc}
    volumes:
      - ajc_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER:-ajc} -d $${POSTGRES_DB:-ajc}"]
      interval: 10s
      timeout: 5s
      retries: 10
    networks:
      - ajc_internal

  minio:
    image: minio/minio:RELEASE.2025-07-23T15-54-02Z
    restart: unless-stopped
    command: ["server", "/data", "--console-address", ":9001"]
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:?defina MINIO_ROOT_USER no Coolify}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:?defina MINIO_ROOT_PASSWORD no Coolify}
    volumes:
      - ajc_minio_data:/data
    expose:
      - "9000"
      - "9001"
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O /dev/null http://127.0.0.1:9000/minio/health/live || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 10
    networks:
      - ajc_internal

  api:
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      minio:
        condition: service_started
    environment:
      NODE_ENV: production
      API_PORT: 3000
      DATABASE_URL: postgresql://${POSTGRES_USER:-ajc}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-ajc}
      AUTH_TOKEN_SECRET: ${AUTH_TOKEN_SECRET:?defina AUTH_TOKEN_SECRET no Coolify}
      AUTH_ACCESS_TTL_SECONDS: ${AUTH_ACCESS_TTL_SECONDS:-900}
      AUTH_REFRESH_TTL_SECONDS: ${AUTH_REFRESH_TTL_SECONDS:-2592000}
      CORS_ORIGINS: ${CORS_ORIGINS:-https://ajcmvp.vercel.app}
      PAYMENT_GATEWAY_MODE: ${PAYMENT_GATEWAY_MODE:-stub}
      BPE_MODE: ${BPE_MODE:-stub}
      WHATSAPP_MODE: ${WHATSAPP_MODE:-stub}
      BLUETOOTH_PRINT_MODE: ${BLUETOOTH_PRINT_MODE:-stub}
      OBJECT_STORAGE_DRIVER: ${OBJECT_STORAGE_DRIVER:-minio}
      OBJECT_STORAGE_ENDPOINT: ${OBJECT_STORAGE_ENDPOINT:-http://minio:9000}
      OBJECT_STORAGE_PUBLIC_URL: ${OBJECT_STORAGE_PUBLIC_URL:-https://storage-ajc.byteintelligence.com.br}
      OBJECT_STORAGE_ACCESS_KEY: ${OBJECT_STORAGE_ACCESS_KEY:?defina OBJECT_STORAGE_ACCESS_KEY no Coolify}
      OBJECT_STORAGE_SECRET_KEY: ${OBJECT_STORAGE_SECRET_KEY:?defina OBJECT_STORAGE_SECRET_KEY no Coolify}
      OBJECT_STORAGE_REGION: ${OBJECT_STORAGE_REGION:-us-east-1}
    expose:
      - "3000"
    networks:
      - ajc_internal

  worker:
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      minio:
        condition: service_started
    command: ["node", "apps/api/dist/apps/api/src/worker.js"]
    environment:
      NODE_ENV: production
      DATABASE_URL: postgresql://${POSTGRES_USER:-ajc}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-ajc}
      OBJECT_STORAGE_DRIVER: ${OBJECT_STORAGE_DRIVER:-minio}
      OBJECT_STORAGE_ENDPOINT: ${OBJECT_STORAGE_ENDPOINT:-http://minio:9000}
      OBJECT_STORAGE_ACCESS_KEY: ${OBJECT_STORAGE_ACCESS_KEY:?defina OBJECT_STORAGE_ACCESS_KEY no Coolify}
      OBJECT_STORAGE_SECRET_KEY: ${OBJECT_STORAGE_SECRET_KEY:?defina OBJECT_STORAGE_SECRET_KEY no Coolify}
      OBJECT_STORAGE_REGION: ${OBJECT_STORAGE_REGION:-us-east-1}
    networks:
      - ajc_internal

volumes:
  ajc_postgres_data:
  ajc_minio_data:

networks:
  ajc_internal:
